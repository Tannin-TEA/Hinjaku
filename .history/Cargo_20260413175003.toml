[package]
name = "archview"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "archview"
path = "src/main.rs"

[dependencies]
eframe = "0.27"
egui = "0.27"
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "gif", "bmp", "webp", "tiff"] }
zip = "2.1"
sevenz-rust = "0.6"
rfd = "0.14"
anyhow = "1"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
chrono = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
